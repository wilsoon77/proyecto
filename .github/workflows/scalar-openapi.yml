name: Scalar OpenAPI

on:
  pull_request:
    paths:
      - "api/src/**"
      - "api/scripts/**"
      - "api/package.json"
      - "api/package-lock.json"
      - "api/tsconfig.json"
      - ".github/workflows/scalar-openapi.yml"
  push:
    branches:
      - main
    paths:
      - "api/src/**"
      - "api/scripts/**"
      - "api/package.json"
      - "api/package-lock.json"
      - "api/tsconfig.json"
      - ".github/workflows/scalar-openapi.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scalar-openapi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-openapi:
    name: Validate OpenAPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI
        env:
          OPENAPI_SERVER_URL: ${{ vars.OPENAPI_SERVER_URL }}
        run: npm run openapi:gen:dist

      - name: Validate with Scalar CLI
        run: npx -y @scalar/cli@latest document validate openapi.json

  publish-to-scalar:
    name: Publish to Scalar
    needs: validate-openapi
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI
        env:
          OPENAPI_SERVER_URL: ${{ vars.OPENAPI_SERVER_URL }}
        run: npm run openapi:gen:dist

      - name: Validate with Scalar CLI
        run: npx -y @scalar/cli@latest document validate openapi.json

      - name: Check Scalar config
        env:
          SCALAR_API_KEY: ${{ secrets.SCALAR_API_KEY }}
          SCALAR_NAMESPACE: ${{ vars.SCALAR_NAMESPACE }}
        run: |
          if [ -z "$SCALAR_API_KEY" ]; then
            echo "Missing secret: SCALAR_API_KEY"
            exit 1
          fi
          if [ -z "$SCALAR_NAMESPACE" ]; then
            echo "Missing variable: SCALAR_NAMESPACE"
            exit 1
          fi

      - name: Compute Scalar version
        run: |
          # Use a strictly increasing numeric semver to satisfy Scalar ordering.
          # Format: <epoch_seconds>.<run_number>.<run_attempt>
          SCALAR_VERSION="$(date +%s).${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          echo "SCALAR_VERSION=$SCALAR_VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $SCALAR_VERSION"

      - name: Publish OpenAPI to Scalar Registry
        env:
          SCALAR_API_KEY: ${{ secrets.SCALAR_API_KEY }}
          SCALAR_NAMESPACE: ${{ vars.SCALAR_NAMESPACE }}
          SCALAR_VERSION: ${{ env.SCALAR_VERSION }}
        run: |
          npx -y @scalar/cli@latest auth login --token "$SCALAR_API_KEY"
          npx -y @scalar/cli@latest registry publish openapi.json \
            --namespace "$SCALAR_NAMESPACE" \
            --slug "panaderia-api" \
            --version "$SCALAR_VERSION"
