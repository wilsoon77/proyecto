name: Backend CI (Estable)

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: './api/package-lock.json'

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Compile backend
        run: npm run build

      - name: Generate OpenAPI (smoke check)
        run: npm run openapi:gen:dist

      - name: Verify OpenAPI artifact
        run: test -s openapi.json

      - name: Run backend e2e tests (optional)
        if: ${{ vars.RUN_BACKEND_E2E == 'true' }}
        run: npm run test -- --runInBand